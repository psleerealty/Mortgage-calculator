<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mortgage Balance Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 40px;
      max-width: 520px;
      width: 100%;
    }
    .card-header { margin-bottom: 28px; }
    .card-header h1 { font-size: 1.5rem; font-weight: 700; color: #1a2e44; }
    .card-header p { font-size: 0.875rem; color: #6b7a8d; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: #3d5166; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 6px;
    }
    input, select {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #d1dbe6; border-radius: 8px;
      font-size: 1rem; color: #1a2e44; background: #f8fafc;
      transition: border-color 0.2s; outline: none;
    }
    input:focus, select:focus { border-color: #2563eb; background: #fff; }
    .input-prefix { position: relative; }
    .input-prefix span {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); color: #6b7a8d;
      font-size: 1rem; pointer-events: none;
    }
    .input-prefix input { padding-left: 26px; }
    .input-suffix { position: relative; }
    .input-suffix span {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%); color: #6b7a8d;
      font-size: 0.9rem; pointer-events: none;
    }
    .input-suffix input { padding-right: 40px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .rate-hint {
      margin-top: 6px; font-size: 0.78rem; color: #6b7a8d;
      min-height: 18px; transition: color 0.2s;
    }
    .rate-hint.found { color: #16a34a; font-weight: 600; }
    .rate-hint.notfound { color: #d97706; }
    .rate-source-tag {
      display: inline-block; font-size: 0.7rem;
      background: #eff6ff; color: #2563eb;
      border: 1px solid #bfdbfe; border-radius: 4px;
      padding: 1px 6px; margin-left: 4px; font-weight: 600;
    }
    button {
      width: 100%; padding: 13px; background: #2563eb; color: #fff;
      font-size: 1rem; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    .results { margin-top: 28px; display: none; }
    .results.show { display: block; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .result-box {
      background: #f0f4f8; border-radius: 10px;
      padding: 16px; text-align: center;
    }
    .result-box.highlight { background: #eff6ff; border: 1.5px solid #bfdbfe; }
    .result-box.equity { background: #f0fdf4; border: 1.5px solid #bbf7d0; }
    .result-box .label {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #6b7a8d; margin-bottom: 6px;
    }
    .result-box .value { font-size: 1.35rem; font-weight: 700; color: #1a2e44; }
    .result-box.highlight .value { color: #2563eb; }
    .result-box.equity .value { color: #16a34a; }
    .result-box .sub { font-size: 0.75rem; color: #6b7a8d; margin-top: 3px; }
    .divider { border: none; border-top: 1.5px solid #e5eaf0; margin: 20px 0; }
    .amort-toggle {
      background: none; border: 1.5px solid #d1dbe6; color: #3d5166;
      font-size: 0.85rem; font-weight: 600; padding: 9px 16px;
      border-radius: 8px; cursor: pointer; width: auto;
      margin-top: 0; transition: background 0.2s;
    }
    .amort-toggle:hover { background: #f0f4f8; }
    .amort-table-wrap {
      display: none; margin-top: 16px; max-height: 280px;
      overflow-y: auto; border-radius: 8px; border: 1.5px solid #e5eaf0;
    }
    .amort-table-wrap.show { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead th {
      background: #f0f4f8; color: #3d5166; font-weight: 700;
      padding: 9px 10px; text-align: right;
      position: sticky; top: 0;
    }
    thead th:first-child { text-align: left; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody td { padding: 7px 10px; text-align: right; color: #1a2e44; }
    tbody td:first-child { text-align: left; color: #6b7a8d; }
    .error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>🏠 Mortgage Balance Calculator</h1>
      <p>Estimate remaining balance, equity, and payoff timeline</p>
    </div>

    <div class="form-group">
      <label>Original Loan Amount</label>
      <div class="input-prefix">
        <span>$</span>
        <input type="number" id="loanAmount" placeholder="250,000" min="0" step="1000" />
      </div>
    </div>

    <div class="form-group">
      <label>Loan Start Date</label>
      <input type="month" id="startDate" onchange="autoFillRate()" />
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>Annual Interest Rate</label>
        <div class="input-suffix">
          <span>%</span>
          <input type="number" id="interestRate" placeholder="6.5" min="0" max="30" step="0.01" />
        </div>
        <div class="rate-hint" id="rateHint"></div>
      </div>
      <div class="form-group">
        <label>Loan Term</label>
        <select id="loanTerm" onchange="autoFillRate()">
          <option value="30" selected>30 Years</option>
          <option value="20">20 Years</option>
          <option value="15">15 Years</option>
          <option value="10">10 Years</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Current Home Value <span style="font-weight:400;color:#9aabb8;">(optional — for equity)</span></label>
      <div class="input-prefix">
        <span>$</span>
        <input type="number" id="homeValue" placeholder="320,000" min="0" step="1000" />
      </div>
    </div>

    <button onclick="calculate()">Calculate Balance</button>
    <p class="error-msg" id="errorMsg">Please fill in all required fields.</p>

    <div class="results" id="results">
      <hr class="divider" />
      <div class="results-grid" id="resultsGrid"></div>
      <button class="amort-toggle" onclick="toggleAmort()">📋 Show Amortization Schedule</button>
      <div class="amort-table-wrap" id="amortWrap">
        <table>
          <thead>
            <tr>
              <th>Date</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th>
            </tr>
          </thead>
          <tbody id="amortBody"></tbody>
        </table>
      </div>
    </div>
  </div>

    // Set default start date to 5 years ago
    const defaultDate = new Date();
    defaultDate.setFullYear(defaultDate.getFullYear() - 5);
    document.getElementById('startDate').value =
      defaultDate.getFullYear() + '-' + String(defaultDate.getMonth() + 1).padStart(2, '0');
    autoFillRate();

    function autoFillRate() {
      const ym = document.getElementById('startDate').value;
      const term = parseInt(document.getElementById('loanTerm').value);
      const hintEl = document.getElementById('rateHint');
      if (!ym) { hintEl.textContent = ''; return; }

      const rateMap = (term === 15) ? RATES_15 : RATES_30;
      const termLabel = (term === 15) ? '15-yr' : '30-yr';

      // Try exact month, then search nearby months (±3)
      let rate = rateMap[ym];
      let matchedYM = ym;
      if (!rate) {
        const [y, m] = ym.split('-').map(Number);
        for (let delta = 1; delta <= 3; delta++) {
          for (const sign of [1, -1]) {
            let nm = m + sign * delta;
            let ny = y;
            if (nm < 1) { nm += 12; ny--; }
            if (nm > 12) { nm -= 12; ny++; }
            const candidate = ny + '-' + String(nm).padStart(2, '0');
            if (rateMap[candidate]) {
              rate = rateMap[candidate];
              matchedYM = candidate;
              break;
            }
          }
          if (rate) break;
        }
      }

      if (rate) {
        document.getElementById('interestRate').value = rate;
        const [y, m] = matchedYM.split('-');
        const label = new Date(y, m - 1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        const exact = matchedYM === ym;
        hintEl.className = 'rate-hint found';
        hintEl.innerHTML = exact
          ? `✓ Avg ${termLabel} rate for ${label}: ${rate}% <span class="rate-source-tag">Freddie Mac PMMS</span>`
          : `✓ Nearest avg (${label}): ${rate}% <span class="rate-source-tag">Freddie Mac PMMS</span>`;
      } else {
        hintEl.className = 'rate-hint notfound';
        hintEl.textContent = 'No historical data — please enter manually.';
      }
    }

    function fmt(n) {
      return '$' + Math.round(n).toLocaleString('en-US');
    }

    function calculate() {
      const P = parseFloat(document.getElementById('loanAmount').value);
      const annualRate = parseFloat(document.getElementById('interestRate').value);
      const termYears = parseInt(document.getElementById('loanTerm').value);
      const startVal = document.getElementById('startDate').value;
      const homeVal = parseFloat(document.getElementById('homeValue').value) || null;
      const errEl = document.getElementById('errorMsg');

      if (!P || !annualRate || !startVal) {
        errEl.style.display = 'block'; return;
      }
      errEl.style.display = 'none';

      const r = annualRate / 100 / 12;
      const n = termYears * 12;
      const M = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

      const [startYear, startMonth] = startVal.split('-').map(Number);
      const now = new Date();
      const paymentsMade = Math.min(
        (now.getFullYear() - startYear) * 12 + (now.getMonth() + 1 - startMonth), n
      );

      const remaining = P * Math.pow(1 + r, paymentsMade)
                      - M * ((Math.pow(1 + r, paymentsMade) - 1) / r);
      const paymentsLeft = n - paymentsMade;
      const payoffDate = new Date();
      payoffDate.setMonth(payoffDate.getMonth() + paymentsLeft);
      const payoffStr = payoffDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const totalPaid = M * paymentsMade;
      const interestPaid = totalPaid - (P - Math.max(0, remaining));

      let gridHTML = `
        <div class="result-box highlight">
          <div class="label">Remaining Balance</div>
          <div class="value">${fmt(Math.max(0, remaining))}</div>
          <div class="sub">${paymentsMade} of ${n} payments made</div>
        </div>
        <div class="result-box">
          <div class="label">Monthly Payment</div>
          <div class="value">${fmt(M)}</div>
          <div class="sub">Principal & Interest</div>
        </div>
        <div class="result-box">
          <div class="label">Payoff Date</div>
          <div class="value" style="font-size:1.05rem">${payoffStr}</div>
          <div class="sub">${paymentsLeft} payments left</div>
        </div>
        <div class="result-box">
          <div class="label">Interest Paid</div>
          <div class="value">${fmt(interestPaid)}</div>
          <div class="sub">of ${fmt(totalPaid)} total paid</div>
        </div>
      `;

      if (homeVal) {
        const equity = homeVal - Math.max(0, remaining);
        const equityPct = ((equity / homeVal) * 100).toFixed(1);
        gridHTML += `
          <div class="result-box equity" style="grid-column: span 2;">
            <div class="label">Estimated Equity</div>
            <div class="value">${fmt(equity)} (${equityPct}%)</div>
            <div class="sub">Based on ${fmt(homeVal)} estimated home value</div>
          </div>
        `;
      }

      document.getElementById('resultsGrid').innerHTML = gridHTML;
      document.getElementById('results').classList.add('show');
      buildAmort(P, r, M, n, startYear, startMonth);
    }

    function buildAmort(P, r, M, n, startYear, startMonth) {
      let balance = P;
      const now = new Date();
      const currentPayment = (now.getFullYear() - startYear) * 12 + (now.getMonth() + 1 - startMonth);
      let rows = '';
      for (let i = 1; i <= n; i++) {
        const interest = balance * r;
        const principal = M - interest;
        balance = Math.max(0, balance - principal);
        const d = new Date(startYear, startMonth - 1 + i);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        const isCurrent = i === currentPayment;
        const style = isCurrent ? ' style="background:#eff6ff;font-weight:600;"' : '';
        rows += `<tr${style}>
          <td>${dateStr}${isCurrent ? ' ◀' : ''}</td>
          <td>${fmt(M)}</td><td>${fmt(principal)}</td>
          <td>${fmt(interest)}</td><td>${fmt(balance)}</td>
        </tr>`;
      }
      document.getElementById('amortBody').innerHTML = rows;
      document.getElementById('amortWrap')._scrollToCurrent = true;
    }

    function toggleAmort() {
      const wrap = document.getElementById('amortWrap');
      const btn = document.querySelector('.amort-toggle');
      wrap.classList.toggle('show');
      btn.textContent = wrap.classList.contains('show')
        ? '📋 Hide Amortization Schedule'
        : '📋 Show Amortization Schedule';
      if (wrap._scrollToCurrent) {
        const current = wrap.querySelector('tr[style*="background"]');
        if (current) current.scrollIntoView({ block: 'center' });
        wrap._scrollToCurrent = false;
      }
    }
  </script>
